<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Partido - Real Madrid</title>
    <link href="css/estilos.css" rel="stylesheet" type="text/css" />
    <link rel="icon" href="img/favicon.png" type="image/x-icon">
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
    <script src="js/cargarPartido.js" defer></script>
</head>

<body>
    <div class="contenedor">
        <div class="contenido">
            <header class="page-header">
                <div class="nav-buttons">
                    <a id="btnIndex" class="icon-button" title="Inicio"><img src="img/ico/casa.png" alt="Inicio" /></a>
                    <a id="btnAtras" class="icon-button" title="Volver"><img src="img/ico/volver.png" alt="Volver" /></a>
                </div>
                <div class="match-header">
                    <div class="team-card home-team">
                        <img id="imgLocal" class="team-logo" alt="Local" />
                        <div class="team-name" id="nombreLocal"></div>
                    </div>
                    <div class="score-card">
                        <div class="match-title azul" id="titulo"></div>
                        <div class="score-value" id="resultado"></div>
                    </div>
                    <div class="team-card away-team">
                        <img id="imgVisitante" class="team-logo" alt="Visitante" />
                        <div class="team-name" id="nombreVisitante"></div>
                    </div>
                </div>
            </header>

            <section id="sectionFormaciones" class="section-card lineup-section">
                <div class="section-header">
                    <h2>Formaciones</h2>
                </div>
                <div class="lineup-grid">
                    <div class="team-lineup">                        
                        <div class="starter-block">
                            <table id="tblAlineacionLocal" class="lineup-table"></table>
                        </div>
                        <div class="subsection-header"> Suplentes</div>
                        <div class="substitutes-block">
                            <table id="tblSuplentesLocal" class="substitutes-table"></table>
                        </div>
                        <div class="coach"> <strong>Entrenador:</strong> <span id="entrenadorLocal"></span></div>
                    </div>
                    <div class="team-lineup">
                        <div class="starter-block">
                            <table id="tblAlineacionVisitante" class="lineup-table"></table>
                        </div>
                        <div class="subsection-header"> Suplentes</div>
                        <div class="substitutes-block">
                            <table id="tblSuplentesVisitante" class="substitutes-table"></table>
                        </div>
                        <div class="coach"> <strong>Entrenador:</strong> <span id="entrenadorVisitante"></span></div>
                    </div>
                </div>
            </section>

            <section id="sectionDatos" class="section-card info-section">
                <div class="section-header">
                    <h2>Datos del partido</h2>
                </div>
                <div class="info-grid">
                    <div class="info-details">
                        <div class="info-item"> <strong>Estadio:</strong> <span id="estadio"></span>, <span id="ciudad"></span></div>
                        <div class="info-item"> <strong>Espectadores:</strong> <span id="espectadores"></span></div>
                        <div class="info-item"> <strong>Fecha:</strong> <span id="fecha"></span></div>
                        <div class="info-item"> <strong>Hora:</strong> <span id="hora"></span></div>
                        <div class="info-item"> <strong>Árbitro:</strong> <span id="arbitro"></span></div>
                    </div>
                    <div class="info-image">
                        <img class="imagen" id="imgEstadio" alt="Imagen Estadio" />
                    </div>
                </div>
            </section>

            <section id="sectionGoles" class="section-card stats-section">
                <div id="tblGoles"></div>
                <div id="tblPenaltis"></div>
            </section>
        </div>
    </div>
</body>

</html>
