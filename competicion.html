<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Competición - Real Madrid</title>
    <link href="css/estilos.css" rel="stylesheet" type="text/css" />
    <link rel="icon" href="img/favicon.png" type="image/x-icon">
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
    <script src="js/cargarCompeticion.js" defer></script>
</head>

<body>
    <div class="contenedor">
        <div class="contenido">
            <header class="page-header">
                <div class="nav-buttons">
                    <a id="btnIndex" class="icon-button" title="Inicio"><img src="img/ico/casa.png" alt="Inicio" /></a>
                    <a id="btnAtras" class="icon-button" title="Volver"><img src="img/ico/volver.png" alt="Volver" /></a>
                </div>
                <div class="score-card">
                    <div class="score-value"><span id="titulo"></span></div>
                </div>
            </header>

            <section class="section-card standings-section">                
                <div class="standings-content">
                    <table id="tblEliminatorias" class="tblMadre"></table>
                    <table id="tblLiga" class="tblMadre"></table>
                    <table id="tblPrevias" class="tblMadre"></table>
                </div>
            </section>
        </div>
    </div>
</body>

</html>
